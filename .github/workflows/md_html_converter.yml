name: Convert Markdown naar HTML

on:
  push:
    branches: [web, main]
    paths:
      - 'docs/**/*.md'  
jobs:
  build:
    permissions:
      contents: write
    
    runs-on: [self-hosted, Linux, X64, mko-docker]
  
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc file

      - name: Convert Markdown naar HTML
        run: |
          find docs -name "*.md" -print0 | while IFS= read -r -d '' file; do
            if file "$file" | grep -q UTF-16; then
              iconv -f utf-16 -t utf-8 "$file" | pandoc -f markdown -t html -o "${file%.md}.html"
            else
              pandoc "$file" -f markdown -t html -o "${file%.md}.html"
            fi
          done


      - name: Commit HTML
        run: |
          git config --global user.name "${{ runner.name }}"
          git config --global user.email "actions@github.com"
          git add docs/**/*.html 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Auto-convert Markdown to HTML"
          git push