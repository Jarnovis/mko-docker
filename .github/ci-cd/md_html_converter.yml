name: Convert Markdown naar HTML

on:
  push:
    branches: [web, main]
    paths:
      - 'docs/**.md'
  
jobs:
  build:
    runs-on: [self-hosted, Linux, X64, mko-docker]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: sudo apt-get install -y pandoc

      - name: Convert Markdown naar HTML
        run: |
          for file in $(find docs -name "*.md"); do
            pandoc "$file" -o "${file%.md}.html"
          done


      - name: Commit HTML
        run: |
          git config --global user.name "${{ runner.name }}"
          git config --global user.email "actions@github.com"
          git add 'docs/**/*.html'
          git diff --cached --quiet || git commit -m "Auto-convert Markdown to HTML"
          git push