<!DOCTYPE html>
<html lang="en" xml:lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="generator" content="pandoc" />
  <title>Document</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #1a1814;
      --ink-light:  #4a4540;
      --ink-faint:  #9a948e;
      --paper:      #faf9f6;
      --paper-warm: #f3f0ea;
      --rule:       #e5e0d8;
      --accent:     #b85c2a;
      --accent-lt:  #f0e4d7;
      --code-bg:    #f0ede6;
      --serif:      'Fraunces', Georgia, serif;
      --sans:       'DM Sans', system-ui, sans-serif;
      --mono:       'DM Mono', 'Courier New', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 17px;
      line-height: 1.75;
      font-weight: 300;
      min-height: 100vh;
    }

    .page-wrap {
      display: grid;
      grid-template-columns: 240px 1fr;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    .topbar {
      grid-column: 1 / -1;
      background: var(--ink);
      color: var(--paper);
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0 2rem;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-logo {
      font-family: var(--serif);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--paper);
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    .topbar-logo span { color: var(--accent); }
    .topbar-sep { flex: 1; }
    .topbar-title {
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--ink-faint);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .sidebar {
      background: var(--paper-warm);
      border-right: 1px solid var(--rule);
      padding: 2rem 1.25rem;
      position: sticky;
      top: 56px;
      height: calc(100vh - 56px);
      overflow-y: auto;
      overscroll-behavior: contain;
    }
    .sidebar-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 0.75rem;
      padding-left: 0.5rem;
    }
    #toc ul { list-style: none; }
    #toc > ul { padding: 0; }
    #toc ul ul { padding-left: 0.75rem; border-left: 1px solid var(--rule); margin-left: 0.5rem; }
    #toc a {
      display: block;
      padding: 0.3rem 0.5rem;
      font-size: 0.82rem;
      color: var(--ink-light);
      text-decoration: none;
      border-radius: 3px;
      line-height: 1.4;
      transition: background 0.15s, color 0.15s;
    }
    #toc a:hover { background: var(--rule); color: var(--ink); }
    #toc ul ul a { font-size: 0.78rem; color: var(--ink-faint); }
    #toc ul ul a:hover { color: var(--ink); }

    main {
      padding: 3.5rem 4rem 6rem;
      max-width: 820px;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: var(--serif);
      font-weight: 700;
      line-height: 1.2;
      color: var(--ink);
      scroll-margin-top: 72px;
    }
    h1 {
      font-size: 2.8rem;
      letter-spacing: -0.03em;
      margin-bottom: 0.4em;
    }
    h2 {
      font-size: 1.65rem;
      margin-top: 3rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1.5px solid var(--rule);
      letter-spacing: -0.02em;
    }
    h3 { font-size: 1.2rem; margin-top: 2rem; margin-bottom: 0.5rem; letter-spacing: -0.01em; }
    h4 { font-size: 1rem; margin-top: 1.5rem; margin-bottom: 0.4rem; }

    p { margin-bottom: 1.2em; }

    a { color: var(--accent); text-underline-offset: 3px; }
    a:hover { color: var(--ink); }

    strong { font-weight: 500; }
    em { font-style: italic; }

    hr { border: none; border-top: 1px solid var(--rule); margin: 2.5rem 0; }

    ul, ol { padding-left: 1.5em; margin-bottom: 1.2em; }
    li { margin-bottom: 0.3em; }
    li > ul, li > ol { margin-top: 0.3em; margin-bottom: 0; }

    blockquote {
      border-left: 3px solid var(--accent);
      background: var(--accent-lt);
      margin: 1.5rem 0;
      padding: 1rem 1.25rem;
      border-radius: 0 4px 4px 0;
      color: var(--ink-light);
      font-style: italic;
    }
    blockquote p { margin: 0; }

    code {
      font-family: var(--mono);
      font-size: 0.84em;
      background: var(--code-bg);
      padding: 0.15em 0.4em;
      border-radius: 3px;
      color: var(--accent);
    }
    pre {
      background: var(--ink);
      border-radius: 6px;
      padding: 1.25rem 1.5rem;
      overflow-x: auto;
      margin: 1.5rem 0;
    }
    pre code {
      background: none;
      color: #e8e3db;
      font-size: 0.83rem;
      padding: 0;
      line-height: 1.65;
    }

    table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; font-size: 0.9rem; }
    thead { border-bottom: 2px solid var(--ink); }
    th {
      text-align: left;
      font-weight: 500;
      padding: 0.6rem 1rem;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ink-light);
    }
    td { padding: 0.6rem 1rem; border-bottom: 1px solid var(--rule); vertical-align: top; }
    tbody tr:hover td { background: var(--paper-warm); }

    img { max-width: 100%; border-radius: 4px; margin: 1rem 0; }

    .doc-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
      font-size: 0.8rem;
      color: var(--ink-faint);
    }
    .doc-meta .pill {
      background: var(--paper-warm);
      border: 1px solid var(--rule);
      border-radius: 20px;
      padding: 0.2em 0.75em;
      font-family: var(--mono);
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

    @media (max-width: 900px) {
      .page-wrap { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      main { padding: 2rem 1.5rem 4rem; max-width: 100%; }
    }
    @media print {
      .topbar, .sidebar { display: none; }
      .page-wrap { display: block; }
      main { padding: 0; max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <header class="topbar">
      <a class="topbar-logo" href="#">Docs<span>.</span></a>
      <span class="topbar-sep"></span>
      
    </header>

    <nav class="sidebar" aria-label="Table of contents">
      <div class="sidebar-label">On this page</div>
      
    </nav>

    <main>
            <p>test test test test test test test test</p>
    </main>
  </div>
</body>
</html>
