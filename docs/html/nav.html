  <script>
    // ── Code blocks: wrap + accessible copy button ──────────────────
    document.querySelectorAll('pre').forEach(function(pre) {
      var code = pre.querySelector('code');
      var lang = '';
      if (code) {
        var cls = Array.from(code.classList);
        var match = cls.find(function(c) { return c.startsWith('language-'); });
        if (match) {
          lang = match.replace('language-', '');
        } else {
          lang = cls.filter(function(c) {
            return !['sourceCode','numberSource','numberLines'].includes(c);
          })[0] || '';
        }
      }
      lang = lang.trim();
 
      var wrap = document.createElement('div');
      wrap.className = 'code-block-wrap';
      wrap.setAttribute('data-lang', lang || 'code');
      wrap.setAttribute('role', 'region');
      wrap.setAttribute('aria-label', (lang ? lang + ' ' : '') + 'codeblok');
 
      var btn = document.createElement('button');
      btn.className = 'code-copy-btn';
      btn.setAttribute('type', 'button');
      btn.setAttribute('aria-label', 'Kopieer code naar klembord');
      btn.textContent = 'kopieer';
 
      btn.addEventListener('click', function() {
        var text = (code || pre).innerText;
        navigator.clipboard.writeText(text).then(function() {
          btn.textContent = 'gekopieerd!';
          btn.setAttribute('aria-label', 'Gekopieerd naar klembord');
          btn.classList.add('copied');
          // Announce to screen readers via live region
          var msg = document.getElementById('sr-announce');
          if (msg) { msg.textContent = ''; msg.textContent = 'Code gekopieerd naar klembord.'; }
          setTimeout(function() {
            btn.textContent = 'kopieer';
            btn.setAttribute('aria-label', 'Kopieer code naar klembord');
            btn.classList.remove('copied');
          }, 2000);
        }).catch(function() {
          btn.textContent = 'mislukt';
          setTimeout(function() { btn.textContent = 'kopieer'; }, 2000);
        });
      });
 
      pre.parentNode.insertBefore(wrap, pre);
      wrap.appendChild(pre);
      wrap.appendChild(btn);
    });
 
    // Live region for screen reader announcements
    var sr = document.createElement('div');
    sr.id = 'sr-announce';
    sr.setAttribute('role', 'status');
    sr.setAttribute('aria-live', 'polite');
    sr.setAttribute('aria-atomic', 'true');
    sr.style.cssText = 'position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;';
    document.body.appendChild(sr);
 
    // ── Tables: add scope to <th> cells (1.3.1) ─────────────────────
    document.querySelectorAll('thead th').forEach(function(th) {
      if (!th.hasAttribute('scope')) th.setAttribute('scope', 'col');
    });
    document.querySelectorAll('tbody th').forEach(function(th) {
      if (!th.hasAttribute('scope')) th.setAttribute('scope', 'row');
    });
  </script>
